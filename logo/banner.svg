<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 260">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <radialGradient id="glowL" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#66bb6a" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#66bb6a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowR" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#ab47bc" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#ab47bc" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="900" height="260" rx="16" fill="url(#bg)"/>

  <!-- Glows -->
  <ellipse cx="150" cy="130" rx="120" ry="115" fill="url(#glowL)"/>
  <ellipse cx="340" cy="130" rx="120" ry="115" fill="url(#glowR)"/>

  <!-- S nodes: S1(90,55) S2(110,115) S3(85,175) S4(150,80) S5(140,160) -->
  <!-- T nodes: T1(330,55) T2(350,115) T3(370,170) T4(300,85) T5(310,160) -->

  <!-- Few internal edges within S (sparse: max-cut means few edges inside) -->
  <line x1="90" y1="55" x2="150" y2="80" stroke="#66bb6a" stroke-width="1.5" opacity="0.35"/>
  <line x1="110" y1="115" x2="140" y2="160" stroke="#66bb6a" stroke-width="1.5" opacity="0.35"/>

  <!-- Few internal edges within T -->
  <line x1="330" y1="55" x2="300" y2="85" stroke="#ab47bc" stroke-width="1.5" opacity="0.35"/>
  <line x1="350" y1="115" x2="310" y2="160" stroke="#ab47bc" stroke-width="1.5" opacity="0.35"/>

  <!-- Many cut edges between S and T (the MAX cut, bold and prominent) -->
  <line x1="90" y1="55" x2="330" y2="55" stroke="#ef5350" stroke-width="2.2" opacity="0.65"/>
  <line x1="90" y1="55" x2="300" y2="85" stroke="#ef5350" stroke-width="2.2" opacity="0.65"/>
  <line x1="150" y1="80" x2="330" y2="55" stroke="#ef5350" stroke-width="2.2" opacity="0.65"/>
  <line x1="150" y1="80" x2="350" y2="115" stroke="#ef5350" stroke-width="2.2" opacity="0.65"/>
  <line x1="110" y1="115" x2="300" y2="85" stroke="#ef5350" stroke-width="2.2" opacity="0.65"/>
  <line x1="110" y1="115" x2="350" y2="115" stroke="#ef5350" stroke-width="2.2" opacity="0.65"/>
  <line x1="110" y1="115" x2="370" y2="170" stroke="#ef5350" stroke-width="2.2" opacity="0.65"/>
  <line x1="85" y1="175" x2="310" y2="160" stroke="#ef5350" stroke-width="2.2" opacity="0.65"/>
  <line x1="85" y1="175" x2="370" y2="170" stroke="#ef5350" stroke-width="2.2" opacity="0.65"/>
  <line x1="140" y1="160" x2="310" y2="160" stroke="#ef5350" stroke-width="2.2" opacity="0.65"/>
  <line x1="140" y1="160" x2="350" y2="115" stroke="#ef5350" stroke-width="2.2" opacity="0.65"/>
  <line x1="150" y1="80" x2="300" y2="85" stroke="#ef5350" stroke-width="2.2" opacity="0.65"/>

  <!-- S partition nodes -->
  <circle cx="90" cy="55" r="9" fill="#66bb6a"/>
  <circle cx="110" cy="115" r="9" fill="#66bb6a"/>
  <circle cx="85" cy="175" r="9" fill="#66bb6a"/>
  <circle cx="150" cy="80" r="9" fill="#66bb6a"/>
  <circle cx="140" cy="160" r="9" fill="#66bb6a"/>

  <!-- T partition nodes -->
  <circle cx="330" cy="55" r="9" fill="#ab47bc"/>
  <circle cx="350" cy="115" r="9" fill="#ab47bc"/>
  <circle cx="370" cy="170" r="9" fill="#ab47bc"/>
  <circle cx="300" cy="85" r="9" fill="#ab47bc"/>
  <circle cx="310" cy="160" r="9" fill="#ab47bc"/>

  <!-- Removed/reduced nodes (ghosted, showing kernelization) -->
  <circle cx="60" cy="130" r="7" fill="none" stroke="#546e7a" stroke-width="1.5" stroke-dasharray="3,3" opacity="0.4"/>
  <circle cx="390" cy="120" r="7" fill="none" stroke="#546e7a" stroke-width="1.5" stroke-dasharray="3,3" opacity="0.4"/>
  <text x="60" y="134" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="8" fill="#546e7a" text-anchor="middle" opacity="0.5">&#x2717;</text>
  <text x="390" y="124" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="8" fill="#546e7a" text-anchor="middle" opacity="0.5">&#x2717;</text>

  <!-- Title -->
  <text x="490" y="90" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="48" font-weight="700" fill="#e0e0e0" letter-spacing="2">
    <tspan fill="#ef5350">fpt</tspan><tspan fill="#546e7a">-</tspan><tspan fill="#e0e0e0">max-cut</tspan>
  </text>

  <!-- Subtitle -->
  <text x="493" y="122" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="17" fill="#90a4ae" letter-spacing="0.5">
    FPT Data Reduction for Maximum Cut
  </text>

  <!-- Badge: Part of KaHIP -->
  <rect x="493" y="145" width="130" height="26" rx="13" fill="#263238"/>
  <text x="558" y="162" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="11" fill="#80cbc4" text-anchor="middle">Part of KaHIP</text>

  <!-- Legend -->
  <circle cx="500" cy="210" r="5" fill="#66bb6a"/>
  <text x="512" y="214" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="11" fill="#a0a0a0">S</text>
  <circle cx="545" cy="210" r="5" fill="#ab47bc"/>
  <text x="557" y="214" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="11" fill="#a0a0a0">T</text>
  <line x1="590" y1="210" x2="612" y2="210" stroke="#ef5350" stroke-width="2.5"/>
  <text x="620" y="214" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="11" fill="#a0a0a0">max cut</text>
  <circle cx="700" cy="210" r="5" fill="none" stroke="#546e7a" stroke-width="1.2" stroke-dasharray="3,3"/>
  <text x="712" y="214" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="11" fill="#a0a0a0">reduced</text>

  <!-- Bottom text -->
  <text x="245" y="245" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="11" fill="#546e7a" text-anchor="middle">
    kernelization &amp; data reduction for maximum cut
  </text>
</svg>
